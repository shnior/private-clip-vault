<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול תוכן | Shneior Eisenbach</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-admin: #0a0a0c;
            --sidebar-bg: #121215;
            --accent: #c5a059;
            --text: #e0e0e0;
            --danger: #ff4d4d;
            --success: #2ecc71;
            --card-bg: #1a1a1e;
        }

        body {
            font-family: 'Google Sans', 'Assistant', sans-serif;
            background-color: var(--bg-admin);
            color: var(--text);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-left: 1px solid rgba(197, 160, 89, 0.2);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(197, 160, 89, 0.1);
            color: var(--accent);
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-add { background: var(--accent); color: #000; }
        .btn-save { background: var(--success); color: #fff; }

        /* --- Forms & Cards --- */
        .section-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--accent);
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #0d0d10;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
        }

        /* --- Table Style for Items --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: right;
            color: var(--accent);
            padding: 12px;
            border-bottom: 2px solid #333;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #222;
        }

        .actions-cell {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1.1rem;
        }

        .icon-btn.delete:hover { color: var(--danger); }
        .icon-btn.edit:hover { color: var(--accent); }

    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>CONTROL ROOM</h2>
        <div class="nav-item active" onclick="showSection('general')"><i class="fa-solid fa-house-gear"></i> הגדרות כלליות</div>
        <div class="nav-item" onclick="showSection('services')"><i class="fa-solid fa-list-check"></i> ניהול שירותים</div>
        <div class="nav-item" onclick="showSection('portfolio')"><i class="fa-solid fa-compact-disc"></i> תיק עבודות</div>
        <div style="margin-top: auto;">
            <a href="index.html" target="_blank" style="text-decoration:none; color:var(--accent); font-size: 0.9rem;">
                <i class="fa-solid fa-eye"></i> לצפייה באתר
            </a>
        </div>
    </aside>

    <main class="main-content">
        
        <!-- הגדרות כלליות -->
        <div id="section-general" class="admin-section">
            <div class="header-actions">
                <h1>הגדרות כלליות</h1>
                <button class="btn btn-save" onclick="saveGeneral()">שמור שינויים</button>
            </div>
            <div class="section-card">
                <div class="form-group">
                    <label>כותרת ראשית (Hero)</label>
                    <input type="text" id="hero-title" value="יוצרים חוויה שלא נשכחת">
                </div>
                <div class="form-group">
                    <label>תת כותרת</label>
                    <input type="text" id="hero-subtitle" value="מוזיקה . וידאו . קריאייטיב">
                </div>
                <div class="form-group">
                    <label>טלפון לוואטסאפ (פורמט: 972...)</label>
                    <input type="text" id="contact-phone" value="972500000000">
                </div>
            </div>
        </div>

        <!-- ניהול שירותים -->
        <div id="section-services" class="admin-section" style="display:none;">
            <div class="header-actions">
                <h1>ניהול שירותים</h1>
                <button class="btn btn-add" onclick="openModal('service')">+ שירות חדש</button>
            </div>
            <div class="section-card">
                <table id="services-table">
                    <thead>
                        <tr>
                            <th>שם השירות</th>
                            <th>תיאור קצר</th>
                            <th>פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="services-list">
                        <!-- יוזן דינמית -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- תיק עבודות -->
        <div id="section-portfolio" class="admin-section" style="display:none;">
            <div class="header-actions">
                <h1>תיק עבודות</h1>
                <button class="btn btn-add" onclick="openModal('portfolio')">+ פרויקט חדש</button>
            </div>
            <div class="section-card">
                <table id="portfolio-table">
                    <thead>
                        <tr>
                            <th>שם הפרויקט</th>
                            <th>קטגוריה</th>
                            <th>פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="portfolio-list">
                        <!-- יוזן דינמית -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        // נתונים ראשוניים (במידה ואין ב-LocalStorage)
        let siteData = JSON.parse(localStorage.getItem('shneorSiteData')) || {
            general: {
                title: "יוצרים חוויה שלא נשכחת",
                subtitle: "מוזיקה . וידאו . קריאייטיב",
                phone: "972500000000"
            },
            services: [
                { id: 1, title: "מוזיקה חיה", desc: "הופעות קלידים לאירועים בסטנדרט גבוה." },
                { id: 2, title: "פוסט פרודקשן", desc: "עריכת וידאו קולנועית ותיקוני צבע." }
            ],
            portfolio: [
                { id: 1, name: "בי בא מועד", category: "הנפשה", img: "https://via.placeholder.com/400" }
            ]
        };

        function saveToLocal() {
            localStorage.setItem('shneorSiteData', JSON.stringify(siteData));
            alert("השינויים נשמרו בהצלחה!");
        }

        function showSection(sectionId) {
            document.querySelectorAll('.admin-section').forEach(s => s.style.display = 'none');
            document.getElementById('section-' + sectionId).style.display = 'block';
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if(sectionId === 'services') renderServices();
            if(sectionId === 'portfolio') renderPortfolio();
        }

        // --- ניהול שירותים ---
        function renderServices() {
            const list = document.getElementById('services-list');
            list.innerHTML = siteData.services.map(s => `
                <tr>
                    <td>${s.title}</td>
                    <td>${s.desc}</td>
                    <td class="actions-cell">
                        <button class="icon-btn edit"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="icon-btn delete" onclick="deleteItem('services', ${s.id})"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // --- ניהול תיק עבודות ---
        function renderPortfolio() {
            const list = document.getElementById('portfolio-list');
            list.innerHTML = siteData.portfolio.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.category}</td>
                    <td class="actions-cell">
                        <button class="icon-btn edit"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="icon-btn delete" onclick="deleteItem('portfolio', ${p.id})"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function deleteItem(type, id) {
            if(confirm("בטוח שברצונך למחוק?")) {
                siteData[type] = siteData[type].filter(item => item.id !== id);
                saveToLocal();
                if(type === 'services') renderServices();
                else renderPortfolio();
            }
        }

        function saveGeneral() {
            siteData.general.title = document.getElementById('hero-title').value;
            siteData.general.subtitle = document.getElementById('hero-subtitle').value;
            siteData.general.phone = document.getElementById('contact-phone').value;
            saveToLocal();
        }

        // פונקציות הוספה (לצורך הדגמה - במציאות יפתח מודל עם שדות)
        function openModal(type) {
            let newItem;
            if(type === 'service') {
                const title = prompt("שם השירות:");
                if(title) {
                    newItem = { id: Date.now(), title: title, desc: "תיאור חדש..." };
                    siteData.services.push(newItem);
                    renderServices();
                }
            } else {
                const name = prompt("שם הפרויקט:");
                if(name) {
                    newItem = { id: Date.now(), name: name, category: "קטגוריה", img: "" };
                    siteData.portfolio.push(newItem);
                    renderPortfolio();
                }
            }
            saveToLocal();
        }

        // טעינה ראשונית
        document.getElementById('hero-title').value = siteData.general.title;
        document.getElementById('hero-subtitle').value = siteData.general.subtitle;
        document.getElementById('contact-phone').value = siteData.general.phone;

    </script>
</body>
</html>
