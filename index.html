<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שניאור אייזנבך | קלידן, מפיק מוזיקלי ועורך וידאו</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    
    <style>
        :root {
            --bg-dark: #070709;
            --burgundy-accent: #7a1528; 
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --gold-solid: #D4AF37;
            --text-light: #f4f4f4;
            --card-bg: rgba(15, 10, 12, 0.8);
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; font-family: 'Heebo', sans-serif; background: var(--bg-dark); color: var(--text-light); scroll-behavior: smooth; line-height: 1.6; }

        header { position: fixed; width: 100%; top: 0; background: rgba(7, 7, 9, 0.9); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid rgba(122, 21, 40, 0.2); }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; max-width: 1400px; margin: 0 auto; }
        .logo { font-size: 24px; font-weight: 900; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { list-style: none; display: flex; gap: 30px; margin: 0; }
        .nav-links a { color: white; text-decoration: none; font-weight: 400; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold-solid); }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1552422535-c45813c61732?auto=format&fit=crop&q=80') center/cover; padding: 0 20px; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 5rem); margin: 0; font-weight: 900; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero h2 { font-size: clamp(1.2rem, 3vw, 2rem); font-weight: 300; margin: 20px 0 40px; }

        /* כפתור וואטסאפ מתוקן שלא מתעוות */
        .cta-btn { 
            display: inline-block; /* חשוב מאוד למניעת עיוות */
            background: transparent; color: var(--gold-solid); border: 2px solid var(--gold-solid);
            padding: 15px 40px; font-size: 1.1rem; font-weight: 700; border-radius: 50px; 
            text-decoration: none; transition: 0.4s; text-align: center;
            white-space: nowrap; /* מונע מהטקסט לרדת שורה */
        }
        .cta-btn:hover { background: var(--gold-solid); color: black; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }

        .section { padding: 80px 20px; max-width: 1400px; margin: 0 auto; text-align: center; }
        .section-title { font-size: 2.5rem; margin-bottom: 50px; font-weight: 700; }
        .section-title span { background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .portfolio-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: 0.4s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .portfolio-card:hover { transform: translateY(-10px); border-color: var(--gold-solid); }
        
        .thumb-wrap { position: relative; width: 100%; padding-top: 56.25%; background: #000; overflow: hidden; }
        .thumb-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.7; }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(0,0,0,0.6); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .play-icon::after { content: ''; border-style: solid; border-width: 10px 0 10px 18px; border-color: transparent transparent transparent white; margin-right: -4px; }
        
        /* Plyr Fix */
        .thumb-wrap .plyr { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .card-info { padding: 20px; text-align: right; }
        .card-info h3 { margin: 0 0 5px; font-size: 1.2rem; color: white; }
        .card-info p { margin: 0; font-size: 0.9rem; color: var(--gold-solid); }

        footer { padding: 60px 20px; text-align: center; background: #050507; border-top: 1px solid rgba(212, 175, 55, 0.1); }
        .footer-logo { font-size: 24px; font-weight: 900; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .contact-text { color: #888; margin-bottom: 30px; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">שניאור אייזנבך</div>
            <ul class="nav-links">
                <li><a href="#home">ראשי</a></li>
                <li><a href="#portfolio">תיק עבודות</a></li>
                <li><a href="#contact">צור קשר</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <h1>הסאונד. הוויזואל. ההפקה.</h1>
        <h2>קלידן, מפיק מוזיקלי, עורך וידאו ואנימטור</h2>
        <a href="#portfolio" class="cta-btn">צפו בעבודות</a>
    </section>

    <section id="portfolio" class="section">
        <h2 class="section-title">פרויקטים <span>נבחרים</span></h2>
        <div class="portfolio-grid" id="portfolioGrid"></div>
    </section>

    <footer id="contact">
        <div class="footer-logo">שניאור אייזנבך</div>
        <p class="contact-text">זמין לאירועים, חתונות והפקות סטודיו ברמה הגבוהה ביותר.</p>
        <a href="https://wa.me/972000000000" target="_blank" class="cta-btn">שלח הודעת וואטסאפ</a>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
            authDomain: "shnior-studio.firebaseapp.com",
            databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shnior-studio"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function syncData() {
            db.ref('siteContent').once('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                // עדכון טקסטים
                if (data.logoText) document.querySelectorAll('.logo, .footer-logo').forEach(el => el.textContent = data.logoText);
                if (data.heroTitle) document.querySelector('.hero h1').textContent = data.heroTitle;
                if (data.heroSubtitle) document.querySelector('.hero h2').textContent = data.heroSubtitle;

                // עדכון פרויקטים
                const grid = document.getElementById('portfolioGrid');
                if (grid && data.portfolio) {
                    grid.innerHTML = '';
                    const items = Array.isArray(data.portfolio) ? data.portfolio : Object.values(data.portfolio);

                    items.forEach(item => {
                        if (!item) return;
                        let vid = "";
                        const url = item.youtubeEmbed || "";
                        if (url.includes("v=")) vid = url.split("v=")[1].split("&")[0];
                        else if (url.includes("youtu.be/")) vid = url.split("/").pop();
                        else if (url.includes("embed/")) vid = url.split("embed/")[1].split(/[? "]/)[0];

                        const thumb = vid ? `https://img.youtube.com/vi/${vid}/maxresdefault.jpg` : '';

                        const card = document.createElement('div');
                        card.className = 'portfolio-card';
                        card.onclick = function() {
                            if (vid) {
                                const wrap = this.querySelector('.thumb-wrap');
                                wrap.innerHTML = `<div class="plyr__video-embed" id="player-${vid}">
                                    <iframe src="https://www.youtube.com/embed/${vid}?origin=${window.location.origin}&modestbranding=1&rel=0&enablejsapi=1" 
                                    allowfullscreen allow="autoplay"></iframe></div>`;
                                new Plyr(`#player-${vid}`, { controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'], ratio: '16:9' }).play();
                                this.onclick = null;
                            }
                        };

                        card.innerHTML = `
                            <div class="thumb-wrap">
                                <div class="thumb-img" style="background-image: url('${thumb}')"></div>
                                <div class="play-icon"></div>
                            </div>
                            <div class="card-info">
                                <h3>${item.title || "פרויקט"}</h3>
                                <p>${item.role || ""}</p>
                            </div>`;
                        grid.appendChild(card);
                    });
                }
            });
        }
        window.addEventListener('DOMContentLoaded', syncData);
    </script>
</body>
</html>
