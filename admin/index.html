<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מנהל תוכן - שניאור אייזנבך</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: 'Heebo', Arial, sans-serif; background: #0a0507; color: #f4f4f4; padding: 30px; max-width: 1200px; margin: 0 auto; }
    h1 { color: #D4AF37; text-align: center; }
    .section { background: #1a0f12; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #7a1528; }
    label { display: block; margin: 12px 0 6px; font-weight: bold; color: #D4AF37; }
    input, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #7a1528; color: white; border-radius: 8px; }
    button { background: #7a1528; color: white; padding: 16px 40px; font-size: 1.2rem; border: none; border-radius: 8px; cursor: pointer; margin: 15px 0; width: 100%; }
    button:hover { background: #D4AF37; color: black; }
    .portfolio-item { border: 1px solid #7a1528; padding: 15px; margin: 15px 0; border-radius: 8px; background: #14090d; }
    .success { color: #4CAF50; }
    #status { text-align: center; font-size: 1.2rem; }
  </style>
</head>
<body>
  <h1>🛠 מנהל תוכן - שניאור אייזנבך</h1>

  <!-- Hero -->
  <div class="section">
    <h2>לוגו & Hero</h2>
    <label>טקסט לוגו</label>
    <input type="text" id="logoText">
    <label>כותרת ראשית</label>
    <input type="text" id="heroTitle">
    <label>תיאור ראשי</label>
    <textarea id="heroSubtitle" rows="3"></textarea>
  </div>

  <!-- Portfolio -->
  <div class="section">
    <h2>תיק עבודות</h2>
    <div id="portfolioContainer"></div>
    <button onclick="addPortfolioItem()">➕ הוסף פרויקט חדש</button>
  </div>

  <button onclick="saveAllContent()">💾 שמור את כל השינויים</button>
  <div id="status"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
      authDomain: "shnior-studio.firebaseapp.com",
      databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shnior-studio"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let portfolioItems = [];

    function renderPortfolio() {
      const container = document.getElementById("portfolioContainer");
      container.innerHTML = "";
      portfolioItems.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "portfolio-item";
        div.innerHTML = `
          <label>כותרת הפרויקט</label>
          <input type="text" value="${item.title || ''}" onchange="portfolioItems[${index}].title = this.value">

          <label>תפקיד / תיאור</label>
          <input type="text" value="${item.role || ''}" onchange="portfolioItems[${index}].role = this.value">

          <label>קישור ליוטיוב (או וידאו)</label>
          <input type="text" value="${item.youtube || ''}" onchange="portfolioItems[${index}].youtube = this.value" placeholder="https://youtube.com/watch?v=...">

          <button onclick="deletePortfolioItem(${index})" style="background:#7a1528; width:auto; margin-top:10px;">🗑 מחק פרויקט</button>
        `;
        container.appendChild(div);
      });
    }

    function addPortfolioItem() {
      portfolioItems.push({ title: "", role: "", youtube: "" });
      renderPortfolio();
    }

    function deletePortfolioItem(index) {
      if (confirm("למחוק פרויקט זה?")) {
        portfolioItems.splice(index, 1);
        renderPortfolio();
      }
    }

    function loadContent() {
      db.ref('siteContent').once('value', (snapshot) => {
        const d = snapshot.val() || {};
        
        document.getElementById("logoText").value = d.logoText || "שניאור אייזנבך";
        document.getElementById("heroTitle").value = d.heroTitle || "הסאונד. הוויזואל. ההפקה.";
        document.getElementById("heroSubtitle").value = d.heroSubtitle || "קלידן, מפיק מוזיקלי, עורך וידאו ואנימטור";

        portfolioItems = d.portfolio || [
          { title: "כדי שיטהרו - מענדי ויזל", role: "הנפשה", youtube: "" },
          // אפשר להוסיף עוד דוגמאות
        ];
        renderPortfolio();
      });
    }

    async function saveAllContent() {
      const status = document.getElementById("status");
      status.textContent = "שומר...";

      const data = {
        logoText: document.getElementById("logoText").value,
        heroTitle: document.getElementById("heroTitle").value,
        heroSubtitle: document.getElementById("heroSubtitle").value,
        portfolio: portfolioItems,
        lastUpdated: Date.now()
      };

      try {
        await db.ref('siteContent').set(data);
        status.innerHTML = '<span class="success">✅ הכל נשמר בהצלחה!</span>';
      } catch (e) {
        status.innerHTML = '❌ שגיאה';
        console.error(e);
      }
    }

    window.onload = loadContent;
  </script>
</body>
</html>
