<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול תוכן | Shnior Eisenbach</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #D4AF37;
            --primary-dark: #b8952e;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --input-bg: #2a2a2a;
            --border: #333;
        }

        body { font-family: 'Google Sans', sans-serif; background: var(--bg-dark); color: var(--text-main); padding: 40px 20px; line-height: 1.6; margin: 0; direction: rtl; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: var(--primary); text-align: center; font-size: 2.5rem; margin-bottom: 40px; }

        .section { background: var(--card-bg); padding: 30px; border-radius: 16px; margin-bottom: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .section-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .section-header h2 { margin: 0; font-size: 1.5rem; color: var(--primary); }

        label { display: block; margin: 15px 0 8px; font-weight: 500; color: var(--text-muted); font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px 15px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 8px; font-family: inherit; box-sizing: border-box; }
        
        .btn { background: var(--primary); color: #000; padding: 12px 25px; font-size: 1rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; }
        .btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-delete { background: #ff4d4d22; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 8px 15px; margin-top: 10px; }
        .btn-delete:hover { background: #ff4d4d; color: white; }

        .portfolio-item { border: 1px solid var(--border); padding: 20px; margin: 20px 0; border-radius: 12px; background: #252525; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #4CAF50; color: white; padding: 12px 30px; border-radius: 50px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛠 מנהל תוכן מקצועי</h1>

    <div class="section">
        <div class="section-header">
            <h2><i class="fas fa-id-card"></i> מיתוג ולוגו</h2>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label>טקסט לוגו (השם שלך)</label>
                <input type="text" id="logoText">
            </div>
            <div>
                <label>העלאת לוגו (תמונה עד 300KB)</label>
                <input type="file" id="logoFile" accept="image/*">
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <h2><i class="fas fa-home"></i> מסך ראשי (Hero)</h2>
        </div>
        <label>כותרת ראשית</label>
        <input type="text" id="heroTitle">
        <label>תיאור תת-כותרת</label>
        <textarea id="heroSubtitle" rows="2"></textarea>
    </div>

    <div class="section">
        <div class="section-header">
            <h2><i class="fas fa-film"></i> תיק עבודות</h2>
            <button class="btn" onclick="addPortfolioItem()">
                <i class="fas fa-plus"></i> הוסף פרויקט
            </button>
        </div>
        <div id="portfolioContainer"></div>
    </div>

    <div style="text-align: center; margin-bottom: 50px;">
        <button class="btn" onclick="saveAllContent()" style="padding: 15px 50px; font-size: 1.2rem;">
            <i class="fas fa-save"></i> שמור את כל השינויים
        </button>
    </div>
</div>

<div id="toast">✅ השינויים נשמרו בהצלחה!</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
        authDomain: "shnior-studio.firebaseapp.com",
        databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "shnior-studio"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let portfolioItems = [];

    // טעינת נתונים קיימים בפתיחה
    function loadExistingData() {
        db.ref('siteContent').once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById("logoText").value = data.logoText || "";
                document.getElementById("heroTitle").value = data.heroTitle || "";
                document.getElementById("heroSubtitle").value = data.heroSubtitle || "";
                portfolioItems = Array.isArray(data.portfolio) ? data.portfolio : (data.portfolio ? Object.values(data.portfolio) : []);
                renderPortfolio();
            }
        });
    }

    function renderPortfolio() {
        const container = document.getElementById("portfolioContainer");
        container.innerHTML = "";
        portfolioItems.forEach((item, i) => {
            if (!item) return;
            const div = document.createElement("div");
            div.className = "portfolio-item";
            div.innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" value="${item.title || ''}" oninput="portfolioItems[${i}].title = this.value" placeholder="שם פרויקט">
                    <input type="text" value="${item.role || ''}" oninput="portfolioItems[${i}].role = this.value" placeholder="תפקיד">
                </div>
                <textarea style="margin-top:10px;" rows="2" oninput="portfolioItems[${i}].youtubeEmbed = this.value" placeholder="לינק יוטיוב">${item.youtubeEmbed || ''}</textarea>
                <button class="btn btn-delete" onclick="deletePortfolioItem(${i})">מחק</button>`;
            container.appendChild(div);
        });
    }

    function addPortfolioItem() { portfolioItems.push({title:"", role:"", youtubeEmbed:""}); renderPortfolio(); }
    function deletePortfolioItem(i) { if(confirm("למחוק?")) { portfolioItems.splice(i,1); renderPortfolio(); } }

    // פונקציית השמירה המאוחדת והמתוקנת
    async function saveAllContent() {
        const file = document.getElementById('logoFile').files[0];
        let logoBase64 = null;

        // אם נבחר לוגו חדש - נהפוך אותו לטקסט
        if (file) {
            if (file.size > 400000) {
                alert("הלוגו גדול מדי! אנא העלה קובץ קטן מ-400KB");
                return;
            }
            logoBase64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        const dataToUpdate = {
            logoText: document.getElementById("logoText").value,
            heroTitle: document.getElementById("heroTitle").value,
            heroSubtitle: document.getElementById("heroSubtitle").value,
            portfolio: portfolioItems
        };

        // הוספת הלוגו רק אם הועלה אחד חדש
        if (logoBase64) {
            dataToUpdate.logoBase64 = logoBase64;
        }

        db.ref('siteContent').update(dataToUpdate).then(() => {
            const toast = document.getElementById("toast");
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 3000);
        }).catch(err => {
            alert("שגיאה בשמירה: " + err.message);
        });
    }

    window.onload = loadExistingData;
</script>
</body>
</html>
