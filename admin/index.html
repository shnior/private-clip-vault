<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מנהל תוכן - שניאור אייזנבך</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: 'Heebo', Arial, sans-serif; background: #0a0507; color: #f4f4f4; padding: 30px; max-width: 800px; margin: 0 auto; }
    h1 { color: #D4AF37; text-align: center; }
    label { display: block; margin: 15px 0 5px; font-weight: bold; color: #D4AF37; }
    input, textarea { width: 100%; padding: 14px; background: #1a0f12; border: 1px solid #7a1528; color: white; border-radius: 8px; font-size: 1.05rem; }
    button { background: #7a1528; color: white; padding: 16px 40px; font-size: 1.2rem; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; width: 100%; }
    button:hover { background: #D4AF37; color: black; }
    #status { margin-top: 20px; font-size: 1.1rem; text-align: center; min-height: 30px; }
    .success { color: #4CAF50; }
    .error { color: #ff4444; }
  </style>
</head>
<body>
  <h1>🛠 מנהל תוכן - שניאור אייזנבך</h1>

  <label>לוגו (טקסט):</label>
  <input type="text" id="logoText">

  <label>כותרת ראשית:</label>
  <input type="text" id="heroTitle">

  <label>תיאור ראשי:</label>
  <textarea id="heroSubtitle" rows="4"></textarea>

  <button onclick="saveContent()">💾 שמור שינויים</button>

  <div id="status"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
      authDomain: "shnior-studio.firebaseapp.com",
      databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shnior-studio",
      storageBucket: "shnior-studio.firebasestorage.app",
      messagingSenderId: "163064507259",
      appId: "1:163064507259:web:3fb46c6795eba5b84f6bde"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function saveContent() {
      const status = document.getElementById("status");
      status.textContent = "שומר...";

      try {
        await db.ref('general/main').set({
          logoText: document.getElementById("logoText").value,
          heroTitle: document.getElementById("heroTitle").value,
          heroSubtitle: document.getElementById("heroSubtitle").value,
          updatedAt: Date.now()
        });

        status.innerHTML = '<span class="success">✅ נשמר בהצלחה!</span>';
      } catch (error) {
        console.error(error);
        status.innerHTML = `<span class="error">❌ שגיאה: ${error.message}</span>`;
      }
    }

    // טעינת נתונים
    window.onload = () => {
      db.ref('general/main').once('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          document.getElementById("logoText").value = data.logoText || "שניאור אייזנבך";
          document.getElementById("heroTitle").value = data.heroTitle || "הסאונד. הוויזואל. ההפקה.";
          document.getElementById("heroSubtitle").value = data.heroSubtitle || "קלידן, מפיק מוזיקלי, עורך וידאו ואנימטור";
        }
      });
    };
  </script>
</body>
</html>
