<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מנהל תוכן - שניאור אייזנבך</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: 'Heebo', Arial, sans-serif; background: #0a0507; color: #f4f4f4; padding: 30px; }
    h1 { color: #D4AF37; text-align: center; }
    .section { background: #1a0f12; padding: 20px; margin: 20px 0; border-radius: 10px; border: 1px solid #7a1528; }
    label { display: block; margin: 10px 0 5px; color: #D4AF37; }
    input, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #7a1528; color: white; border-radius: 6px; }
    button { background: #7a1528; color: white; padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #D4AF37; color: black; }
    #status { text-align: center; font-size: 1.2rem; margin: 20px 0; }
  </style>
</head>
<body>
  <h1>🛠 מנהל תוכן - שניאור אייזנבך</h1>

  <div class="section">
    <label>טקסט לוגו</label>
    <input type="text" id="logoText">

    <label>כותרת ראשית</label>
    <input type="text" id="heroTitle">

    <label>תיאור ראשי</label>
    <textarea id="heroSubtitle" rows="3"></textarea>
  </div>

  <button onclick="saveContent()">💾 שמור שינויים</button>
  <div id="status"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
      authDomain: "shnior-studio.firebaseapp.com",
      databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shnior-studio",
      storageBucket: "shnior-studio.firebasestorage.app",
      messagingSenderId: "163064507259",
      appId: "1:163064507259:web:3fb46c6795eba5b84f6bde"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // טעינה
    function loadContent() {
      db.ref('siteContent').once('value', (snapshot) => {
        const data = snapshot.val() || {};
        console.log("📥 נתונים נטענו:", data);
        
        document.getElementById("logoText").value = data.logoText || "שניאור אייזנבך";
        document.getElementById("heroTitle").value = data.heroTitle || "הסאונד. הוויזואל. ההפקה.";
        document.getElementById("heroSubtitle").value = data.heroSubtitle || "קלידן, מפיק מוזיקלי, עורך וידאו ואנימטור";
      });
    }

    // שמירה
    async function saveContent() {
      const status = document.getElementById("status");
      status.textContent = "שומר...";

      const data = {
        logoText: document.getElementById("logoText").value,
        heroTitle: document.getElementById("heroTitle").value,
        heroSubtitle: document.getElementById("heroSubtitle").value,
        lastUpdated: Date.now()
      };

      console.log("📤 שומר את הנתונים:", data);

      try {
        await db.ref('siteContent').set(data);
        status.innerHTML = '✅ <span style="color:lime">נשמר בהצלחה!</span>';
        console.log("✅ שמירה הצליחה");
      } catch (error) {
        console.error("❌ שגיאה:", error);
        status.innerHTML = '❌ שגיאה - ראה Console';
      }
    }

    window.onload = loadContent;
  </script>
</body>
</html>
