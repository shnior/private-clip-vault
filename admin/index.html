<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מנהל תוכן - שניאור אייזנבך</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: 'Heebo', Arial, sans-serif; background: #0a0507; color: #f4f4f4; padding: 30px; max-width: 1100px; margin: 0 auto; }
    h1 { color: #D4AF37; text-align: center; }
    .section { background: #1a0f12; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #7a1528; }
    label { display: block; margin: 12px 0 6px; font-weight: bold; color: #D4AF37; }
    input, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #7a1528; color: white; border-radius: 8px; font-size: 1.05rem; }
    button { background: #7a1528; color: white; padding: 16px 40px; font-size: 1.2rem; border: none; border-radius: 8px; cursor: pointer; margin: 20px 0; width: 100%; }
    button:hover { background: #D4AF37; color: black; }
    .success { color: #4CAF50; }
    #status { text-align: center; font-size: 1.2rem; margin: 15px 0; min-height: 30px; }
  </style>
</head>
<body>
  <h1>🛠 מנהל תוכן - שניאור אייזנבך</h1>

  <div class="section">
    <h2>לוגו & Hero</h2>
    <label>טקסט לוגו</label>
    <input type="text" id="logoText">

    <label>כותרת ראשית</label>
    <input type="text" id="heroTitle">

    <label>תיאור ראשי</label>
    <textarea id="heroSubtitle" rows="3"></textarea>

    <label>טקסט כפתור</label>
    <input type="text" id="ctaText">
  </div>

  <div class="section">
    <h2>שירותים</h2>
    <label>שירות 1 - כותרת</label>
    <input type="text" id="s1_title">
    <label>שירות 1 - תיאור</label>
    <textarea id="s1_desc" rows="3"></textarea>

    <label>שירות 2 - כותרת</label>
    <input type="text" id="s2_title">
    <label>שירות 2 - תיאור</label>
    <textarea id="s2_desc" rows="3"></textarea>

    <label>שירות 3 - כותרת</label>
    <input type="text" id="s3_title">
    <label>שירות 3 - תיאור</label>
    <textarea id="s3_desc" rows="3"></textarea>
  </div>

  <div class="section">
    <h2>פוטר</h2>
    <label>טקסט בפוטר</label>
    <textarea id="footerText" rows="3"></textarea>
    <label>מספר וואטסאפ (972...)</label>
    <input type="text" id="whatsapp">
  </div>

  <button onclick="saveContent()">💾 שמור את כל השינויים</button>
  <div id="status"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
      authDomain: "shnior-studio.firebaseapp.com",
      databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shnior-studio"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadContent() {
      db.ref('siteContent').once('value', (snapshot) => {
        const d = snapshot.val() || {};
        
        document.getElementById("logoText").value = d.logoText || "שניאור אייזנבך";
        document.getElementById("heroTitle").value = d.heroTitle || "הסאונד. הוויזואל. ההפקה.";
        document.getElementById("heroSubtitle").value = d.heroSubtitle || "קלידן, מפיק מוזיקלי, עורך וידאו ואנימטור";
        document.getElementById("ctaText").value = d.ctaText || "להזמנת אירועים והפקות";

        // שירותים
        document.getElementById("s1_title").value = d.services?.s1?.title || "לייב על הבמה";
        document.getElementById("s1_desc").value = d.services?.s1?.desc || "";
        document.getElementById("s2_title").value = d.services?.s2?.title || "עריכה והפקות וידאו";
        document.getElementById("s2_desc").value = d.services?.s2?.desc || "";
        document.getElementById("s3_title").value = d.services?.s3?.title || "הנפשה וכלי AI";
        document.getElementById("s3_desc").value = d.services?.s3?.desc || "";

        document.getElementById("footerText").value = d.footerText || "";
        document.getElementById("whatsapp").value = d.whatsapp || "972548528425";
      });
    }

    async function saveContent() {
      const status = document.getElementById("status");
      status.textContent = "שומר...";

      const data = {
        logoText: document.getElementById("logoText").value,
        heroTitle: document.getElementById("heroTitle").value,
        heroSubtitle: document.getElementById("heroSubtitle").value,
        ctaText: document.getElementById("ctaText").value,
        services: {
          s1: { title: document.getElementById("s1_title").value, desc: document.getElementById("s1_desc").value },
          s2: { title: document.getElementById("s2_title").value, desc: document.getElementById("s2_desc").value },
          s3: { title: document.getElementById("s3_title").value, desc: document.getElementById("s3_desc").value }
        },
        footerText: document.getElementById("footerText").value,
        whatsapp: document.getElementById("whatsapp").value,
        lastUpdated: Date.now()
      };

      try {
        await db.ref('siteContent').set(data);
        status.innerHTML = '<span class="success">✅ כל השינויים נשמרו בהצלחה!</span>';
      } catch (e) {
        status.innerHTML = '❌ שגיאה - בדוק Console';
        console.error(e);
      }
    }

    window.onload = loadContent;
  </script>
</body>
</html>
