<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מנהל תוכן</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; padding:30px; text-align:center; }
    input, textarea { width: 80%; padding:12px; margin:10px; background:#222; color:white; }
    button { padding:15px 30px; font-size:18px; background:#D4AF37; color:black; border:none; }
  </style>
</head>
<body>
  <h1>מנהל תוכן - בדיקה</h1>

  <input type="text" id="heroTitle" placeholder="כותרת ראשית" value="הסאונד. הוויזואל. ההפקה."><br><br>
  
  <button onclick="saveTest()">שמור</button>
  <p id="status"></p>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
      authDomain: "shnior-studio.firebaseapp.com",
      databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shnior-studio"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function saveTest() {
      const status = document.getElementById("status");
      status.textContent = "שומר...";

      db.ref('test').set({
        heroTitle: document.getElementById("heroTitle").value,
        time: new Date().toISOString()
      }).then(() => {
        status.style.color = "lime";
        status.textContent = "✅ נשמר! בדוק ב-Firebase";
      }).catch((error) => {
        status.style.color = "red";
        status.textContent = "שגיאה: " + error.message;
      });
    }
  </script>
</body>
</html>
