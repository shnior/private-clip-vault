<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מנהל תוכן</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; padding:30px; }
    input, textarea { width: 90%; padding:12px; margin:8px 0; background:#222; color:white; border:1px solid gold; }
    button { padding:15px 30px; font-size:18px; background:#D4AF37; color:black; border:none; cursor:pointer; }
    #status { margin:15px 0; font-weight:bold; }
  </style>
</head>
<body>
  <h1>מנהל תוכן - שניאור אייזנבך</h1>

  <label>לוגו:</label>
  <input type="text" id="logoText">

  <label>כותרת ראשית:</label>
  <input type="text" id="heroTitle">

  <label>תיאור:</label>
  <textarea id="heroSubtitle" rows="3"></textarea>

  <button onclick="saveContent()">שמור שינויים</button>

  <div id="status"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
      authDomain: "shnior-studio.firebaseapp.com",
      projectId: "shnior-studio",
      storageBucket: "shnior-studio.firebasestorage.app",
      messagingSenderId: "163064507259",
      appId: "1:163064507259:web:3fb46c6795eba5b84f6bde"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function saveContent() {
      const status = document.getElementById("status");
      status.textContent = "שומר...";

      try {
        await db.collection("general").doc("main").set({
          logoText: document.getElementById("logoText").value,
          heroTitle: document.getElementById("heroTitle").value,
          heroSubtitle: document.getElementById("heroSubtitle").value,
          updatedAt: new Date()
        }, { merge: true });

        status.style.color = "lime";
        status.textContent = "✅ נשמר בהצלחה!";
        
      } catch (error) {
        console.error("שגיאה:", error);
        status.style.color = "red";
        status.textContent = "❌ שגיאה: " + error.message;
      }
    }

    // טעינה ראשונית
    window.onload = async () => {
      try {
        const doc = await db.collection("general").doc("main").get();
        if (doc.exists) {
          const d = doc.data();
          document.getElementById("logoText").value = d.logoText || "";
          document.getElementById("heroTitle").value = d.heroTitle || "";
          document.getElementById("heroSubtitle").value = d.heroSubtitle || "";
        }
      } catch(e) { console.error(e); }
    };
  </script>
</body>
</html>
